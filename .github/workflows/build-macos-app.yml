name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          bundle_version="$(plutil -extract CFBundleShortVersionString raw Resources/Info.plist)"
          test "$tag_version" = "$bundle_version"

      - name: Build release app bundle
        run: sh scripts/build-app.sh

      - name: Archive app bundle
        run: ditto -c -k --sequesterRsrc --keepParent "Router Online Monitor.app" Router-Online-Monitor-macOS.zip

      - name: Upload app archive
        uses: actions/upload-artifact@v4
        with:
          name: Router-Online-Monitor-macOS
          path: Router-Online-Monitor-macOS.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Router-Online-Monitor-macOS.zip
          body: |
            ## macOS Gatekeeper note

            This open-source release is ad-hoc signed but not Apple-notarized. macOS may block the first launch with “Apple could not verify this app is free of malware.”

            If you trust this build, move the app to `/Applications` and run:

            ```sh
            xattr -dr com.apple.quarantine "/Applications/Router Online Monitor.app"
            ```
          generate_release_notes: true
          append_body: true
